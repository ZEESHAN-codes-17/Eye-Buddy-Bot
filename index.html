<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Blindness Awareness Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Content Container -->
    <main class="container">
        <!-- Header Section -->
        <header class="header">
            <h1>👁️ Color Blindness Awareness Chatbot</h1>
            <p>Learn about color vision deficiency and get tested!</p>
        </header>
        
        <!-- Quick Reply Buttons -->
        <section class="quick-replies" id="quick-replies">
            <button class="quick-reply">What is color blindness?</button>
            <button class="quick-reply">How it happens?</button>
            <button class="quick-reply">Types of color blindness</button>
            <button class="quick-reply">Symptoms & Signs</button>
            <button class="quick-reply">Diagnosis</button>
            <button class="quick-reply">Treatment ?</button>
            <button class="quick-reply">Daily life impact</button>
        </section>
        
        <!-- Chat Container -->
        <section id="chat-container" class="chat-container"></section>
        
        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <!-- Input Section -->
        <section class="input-container">
            <input type="text" id="user-input" placeholder="Ask about color blindness..." aria-label="Type your question">
            <button id="voice-btn" aria-label="Voice Input">🎤</button>
            <button id="send-button">Send</button>
        </section>
        
        <!-- Color Blindness Test Button -->
        <button class="test-button" id="test-button">Take Color Blindness Test</button>
    </main>

    <!-- JavaScript -->
    <script src="java.js"></script>
</body>
</html>
